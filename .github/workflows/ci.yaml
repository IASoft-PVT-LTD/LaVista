name: CI

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target: ["LaVista-x64-linux"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang pkg-config libgtk-3-dev libgtk-4-dev libwebkitgtk-6.0-dev libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxext-dev libxfixes-dev libwayland-dev libxkbcommon-dev libxss-dev libxtst-dev libvulkan-dev

      - name: Configure
        run: cmake --preset ${{ matrix.target }}

      - name: Build
        run: cmake --build --preset ${{ matrix.target }} --config Release

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target: ["LaVista-x64-windows"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Install Vulkan SDK
        run: |
          $vulkanVersion = "1.3.290.0"
          $vulkanInstaller = "VulkanSDK-$vulkanVersion-Installer.exe"
          $url = "https://sdk.lunarg.com/sdk/download/$vulkanVersion/windows/$vulkanInstaller"
          Invoke-WebRequest -Uri $url -OutFile $vulkanInstaller
          & ".\$vulkanInstaller" --accept-licenses --default-answer --confirm-command install com.lunarg.vulkan.core com.lunarg.vulkan.tools
          $env:VULKAN_SDK = "C:\VulkanSDK\$vulkanVersion"
          echo "VULKAN_SDK=$env:VULKAN_SDK" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        run: cmake --preset ${{ matrix.target }}

      - name: Build
        run: cmake --build --preset ${{ matrix.target }} --config Release
